<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* 스크린리더 전용 숨김 텍스트 */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus-visible { border-color: #4f8ef7; }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3a7ae0; }
    .input-row button:focus-visible {
      outline: 3px solid #4f8ef7;
      outline-offset: 2px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
    }

    .clear-btn:hover { text-decoration: underline; }
    .clear-btn:focus-visible {
      outline: 2px solid #e53e3e;
      outline-offset: 2px;
      border-radius: 2px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
      animation: fadeIn 0.2s ease;
    }

    li:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #4f8ef7;
      flex-shrink: 0;
    }

    li input[type="checkbox"]:focus-visible {
      outline: 3px solid #4f8ef7;
      outline-offset: 2px;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
      transition: all 0.2s;
    }

    .item-text.checked {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }
    .delete-btn:focus-visible {
      outline: 2px solid #e53e3e;
      outline-offset: 2px;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .storage-error {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <p class="storage-error" id="storageError" role="alert"></p>

    <form id="itemForm" class="input-row">
      <label for="itemInput" class="sr-only">아이템 이름</label>
      <input type="text" id="itemInput" placeholder="아이템 입력..." autocomplete="off" />
      <button type="submit">추가</button>
    </form>

    <div class="stats">
      <span id="statsText" aria-live="polite">총 0개</span>
      <button class="clear-btn" id="clearBtn" type="button">완료 항목 삭제</button>
    </div>

    <ul id="list" aria-label="쇼핑 리스트"></ul>
    <p class="loading" id="loadingMsg">불러오는 중...</p>
    <p class="empty" id="emptyMsg" style="display:none;">아이템을 추가해 보세요!</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://oamldtypzpjhjuouxobm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hbWxkdHlwenBqaGp1b3V4b2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzQ5MDIsImV4cCI6MjA4OTE1MDkwMn0.uPrmQ4hkKw1aibe-a3NXJvM0A7sc38vKRCpd5eQ3imQ';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    function showError(msg) {
      const el = document.getElementById('storageError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('storageError').style.display = 'none';
    }

    function render() {
      const list = document.getElementById('list');
      const emptyMsg = document.getElementById('emptyMsg');
      const loadingMsg = document.getElementById('loadingMsg');
      const statsText = document.getElementById('statsText');

      loadingMsg.style.display = 'none';
      list.innerHTML = '';
      emptyMsg.style.display = items.length === 0 ? 'block' : 'none';

      items.forEach((item) => {
        const li = document.createElement('li');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.setAttribute('aria-label', item.text + (item.checked ? ' (완료)' : ''));
        checkbox.addEventListener('change', () => toggleItem(item.id));

        const span = document.createElement('span');
        span.className = 'item-text' + (item.checked ? ' checked' : '');
        span.textContent = item.text;

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'delete-btn';
        delBtn.textContent = '✕';
        delBtn.setAttribute('aria-label', `${item.text} 삭제`);
        delBtn.addEventListener('click', () => deleteItem(item.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });

      const total = items.length;
      const checked = items.filter(i => i.checked).length;
      statsText.textContent = `총 ${total}개 (완료 ${checked}개)`;
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showError('데이터를 불러오는 중 오류가 발생했습니다: ' + error.message);
        document.getElementById('loadingMsg').style.display = 'none';
        return;
      }

      items = data;
      render();
    }

    async function addItem(text) {
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();

      if (error) {
        showError('아이템 추가 중 오류가 발생했습니다: ' + error.message);
        return;
      }

      hideError();
      items.push(data);
      render();
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);

      if (error) {
        showError('업데이트 중 오류가 발생했습니다: ' + error.message);
        return;
      }

      hideError();
      item.checked = !item.checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제 중 오류가 발생했습니다: ' + error.message);
        return;
      }

      hideError();
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        showError('삭제 중 오류가 발생했습니다: ' + error.message);
        return;
      }

      hideError();
      items = items.filter(i => !i.checked);
      render();
    }

    document.getElementById('itemForm').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      addItem(text);
      input.value = '';
      input.focus();
    });

    document.getElementById('clearBtn').addEventListener('click', clearChecked);

    loadItems();
  </script>
</body>
</html>
